name: Bug Report
description: Report a bug in MD Feedback
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug!"
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open a markdown file
        2. Select text and press '2'
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: "0.8.0"
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: "1.95.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
