name: Render Demo GIF

on:
  pull_request:
    paths:
      - "demos/remotion/**"
  push:
    branches: [dev]
    paths:
      - "demos/remotion/**"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install deps
        working-directory: demos/remotion
        run: npm install

      - name: Render GIF
        working-directory: demos/remotion
        run: npx remotion render src/index.ts DemoComposition --codec=gif --width=800 --height=500 --output=out/demo.gif

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: demo-gif
          path: demos/remotion/out/*.gif

      - name: Sync demo.gif into assets (dev push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: cp demos/remotion/out/demo.gif assets/demo.gif

      - name: Commit updated demo.gif (dev push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/demo.gif
          if git diff --cached --quiet; then
            echo "No demo.gif changes to commit"
            exit 0
          fi
          git commit -m "chore: update demo gif"
          git push
