name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:customer
      - run: pnpm guard:public-surface
        env:
          GUARD_PATTERNS: ${{ secrets.GUARD_PATTERNS }}
      - run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}" pnpm verify-release
          fi
      - run: pnpm -r build
      - run: pnpm test
      - run: pnpm --filter md-feedback-vscode package
      - name: Generate release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/release-notes.mjs --output RELEASE_NOTES.md
      - name: Validate release notes body
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/check-release-body.mjs --file RELEASE_NOTES.md
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
      - name: Validate published release body
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/check-release-body.mjs --tag "${GITHUB_REF_NAME}"
      - name: Open or reuse post-release sync PR
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          existing_pr=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          list_status=$?
          if [ $list_status -ne 0 ]; then
            echo "Skipping sync PR step: unable to list PRs with current token permissions."
            exit 0
          fi
          if [ -n "$existing_pr" ]; then
            echo "Existing post-release sync PR: #$existing_pr"
            exit 0
          fi
          gh pr create \
            --base main \
            --head dev \
            --title "Release sync PR (${GITHUB_REF_NAME})" \
            --body "Automated post-release sync PR created from tag ${GITHUB_REF_NAME}."
          create_status=$?
          if [ $create_status -ne 0 ]; then
            echo "Skipping sync PR creation: GitHub Actions token cannot create PRs in this repository."
            exit 0
          fi
