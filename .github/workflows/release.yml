name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:customer
      - run: pnpm guard:public-surface
        env:
          GUARD_PATTERNS: ${{ secrets.GUARD_PATTERNS }}
      - run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}" pnpm verify-release
          fi
      - run: pnpm -r build
      - run: pnpm test
      - run: pnpm --filter md-feedback-vscode package
      - name: Generate release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm release:notes > RELEASE_NOTES.md
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c9b5f385f063c6b7f2e0b8dfd7d4c35b39b7efac # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
      - name: Merge dev into main (fast-forward)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          git checkout main
          git merge --ff-only origin/dev
          git push origin main
