name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:user-facing
      - run: pnpm guard:public-surface
        env:
          GUARD_PATTERNS: ${{ secrets.GUARD_PATTERNS }}
      - run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}" pnpm verify-release
          fi
      - run: pnpm check:release-gates
      - run: pnpm --filter md-feedback-vscode package
      - name: Open or reuse post-release sync PR
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          existing_pr=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          list_status=$?
          if [ $list_status -ne 0 ]; then
            echo "Skipping sync PR step: unable to list PRs with current token permissions."
            exit 0
          fi
          if [ -n "$existing_pr" ]; then
            echo "Existing post-release sync PR: #$existing_pr"
            exit 0
          fi
          gh pr create \
            --base main \
            --head dev \
            --title "Release ${GITHUB_REF_NAME}: validated updates for main" \
            --body "This pull request brings customer-facing, validated release updates into \`main\` for ${GITHUB_REF_NAME}."
          create_status=$?
          if [ $create_status -ne 0 ]; then
            echo "Skipping sync PR creation: GitHub Actions token cannot create PRs in this repository."
            exit 0
          fi

